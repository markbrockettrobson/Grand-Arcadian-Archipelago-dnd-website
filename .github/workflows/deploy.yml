name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  discussions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone https://github.com/jackyzha0/quartz.git .quartz
          cd .quartz
          npm install

      - name: Resolve giscus category ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GISCUS_CATEGORY: "Giscus"
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST https://api.github.com/graphql \
            -d "{\"query\":\"{ repository(owner: \\\"$REPO_OWNER\\\", name: \\\"$REPO_NAME\\\") { discussionCategories(first: 100) { nodes { id name } } } }\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: GitHub GraphQL API returned HTTP $HTTP_CODE"
            echo "Response body: $BODY"
            exit 1
          fi
          CATEGORY_ID=$(echo "$BODY" | python3 -c "
import sys, json, os
raw = sys.stdin.read()
try:
    data = json.loads(raw)
except Exception as e:
    print(f'Error: Failed to parse API response: {e}', file=sys.stderr)
    print(f'Raw response (first 500 chars): {raw[:500]}', file=sys.stderr)
    sys.exit(1)
if 'errors' in data:
    print(f'Error: GraphQL errors: {data[\"errors\"]}', file=sys.stderr)
    sys.exit(1)
cats = data.get('data', {}).get('repository', {}).get('discussionCategories', {}).get('nodes', [])
category = os.environ['GISCUS_CATEGORY']
print(f'Found {len(cats)} discussion categories: {[c[\"name\"] for c in cats]}', file=sys.stderr)
match = next((c['id'] for c in cats if c['name'] == category), None)
print(match or '')
")
          if [ -n "$CATEGORY_ID" ]; then
            sed -i "s|categoryId: \"[^\"]*\"|categoryId: \"$CATEGORY_ID\"|" quartz.layout.ts
            echo "Resolved giscus categoryId: $CATEGORY_ID"
          else
            echo "Error: '$GISCUS_CATEGORY' discussion category not found."
            echo "To fix: enable GitHub Discussions on this repo, install the giscus GitHub App, and create a Discussion category named '$GISCUS_CATEGORY'."
            exit 1
          fi

      - name: Copy config files
        run: |
          cp quartz.config.ts .quartz/quartz.config.ts
          cp quartz.layout.ts .quartz/quartz.layout.ts

      - name: Build Quartz site
        run: |
          cd .quartz
          npx quartz build --directory .. --output ../public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
